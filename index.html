<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <style>
        /* --- Layout --- */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* no scrollbars on desktop 1920x1080 */
            background-color: #0d0d1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #gameWrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #gameHUD {
            width: 100%;          /* same width as canvas */
            max-width: 800px;
            display: flex;
            justify-content: space-between;  /* score left, lives right */
            align-items: center;
            padding: 0 4px;
            color: #fff;
            font-family: monospace;
            font-size: 18px;
            user-select: none;
        }

        #livesDisplay {
            letter-spacing: 4px;
        }

        #scoreDisplay {
            font-family: monospace;
            font-size: 18px;
            color: #fff;
            letter-spacing: 1px;
        }

        #gameCanvas {
            display: block;
            /* CSS-only scaling on mobile: keeps internal coords at 800x600 */
            max-width: 100%;
            aspect-ratio: 4 / 3;
            image-rendering: pixelated;
            border: 2px solid #333a4a;
            box-shadow: 0 0 24px rgba(80, 120, 220, 0.25), 0 0 2px #222;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
      <div id="gameHUD">
        <span id="scoreDisplay">0</span>
        <span id="livesDisplay"></span>
      </div>
      <canvas id="gameCanvas"></canvas>
    </div>

    <script src="game-core.js"></script>
    <script>
    // ============================================================
    // CONSTANTS - all magic numbers live here, nowhere else
    // ============================================================
    const CANVAS_WIDTH   = 800;
    const CANVAS_HEIGHT  = 600;

    const BALL_RADIUS    = 8;
    const BALL_SPEED_X   = 4;   // initial horizontal speed (px / frame at 60 fps)
    const BALL_SPEED_Y   = 4;   // initial vertical   speed (px / frame at 60 fps)
    // Magnitude used to renormalise velocity after a paddle hit
    const BALL_SPEED_MAG = Math.sqrt(BALL_SPEED_X ** 2 + BALL_SPEED_Y ** 2);

    const PADDLE_WIDTH   = 100;
    const PADDLE_HEIGHT  = 12;
    const PADDLE_Y       = 560; // 40 px above bottom

    // Maximum horizontal component after a paddle bounce (pixels / frame)
    const MAX_BOUNCE_ANGLE = 5;

    // Keyboard controls (AZERTY French layout primary, arrow keys as fallback)
    const KEY_LEFT  = 'q';
    const KEY_RIGHT = 'd';
    const PADDLE_SPEED = 6; // pixels per frame at 60 fps

    const BRICK_ROWS     = 5;
    const BRICK_COLS     = 10;
    const BRICK_WIDTH    = 70;
    const BRICK_HEIGHT   = 20;
    const BRICK_GAP      = 4;   // horizontal AND vertical gap between bricks
    const BRICK_OFFSET_Y = 60;  // y of the first brick row

    // Verify the grid fits horizontally:
    // 10 * 70 + 9 * 4 = 700 + 36 = 736 px - leaves (800-736)/2 = 32 px each side
    const BRICK_OFFSET_X = (CANVAS_WIDTH - (BRICK_COLS * BRICK_WIDTH + (BRICK_COLS - 1) * BRICK_GAP)) / 2; // = 32

    // One colour per row (top -> bottom)
    const ROW_COLORS = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#3498db'];

    const ROW_POINTS = [50, 40, 30, 20, 10]; // top row = most points

    // Lives
    const MAX_LIVES = 3;

    // ---- Power-ups (US-09 infrastructure) ----
    // Probability that a destroyed brick spawns a capsule.
    const POWERUP_DROP_CHANCE = 0.20;
    // Vertical fall speed of capsules (px / frame at 60 fps), independent of ball speed.
    const POWERUP_FALL_SPEED  = 3;
    // Capsule square side length, used for both AABB collision and rendering.
    const POWERUP_SIZE        = 20;

    // ---- Speed power-ups (US-10) ----
    // Magnitude multipliers applied to the ball velocity vector while the
    // effect is active. Direction is preserved (AC-03); only magnitude changes.
    const SPEED_FAST_MULT  = 1.6;
    const SPEED_SLOW_MULT  = 0.55;
    // Shared duration in ms for both fast and slow capsules (AC-01, AC-02).
    const SPEED_DURATION   = 8000;

    // ---- Paddle size power-ups (US-11) ----
    // Width multipliers applied to the base PADDLE_WIDTH while the effect is
    // active. PADDLE_WIDTH itself is never mutated (AC-05).
    const PADDLE_WIDE_MULT       = 1.7;
    const PADDLE_SMALL_MULT      = 0.5;
    // Shared duration in ms for both wide and small capsules (AC-01, AC-02).
    const PADDLE_SIZE_DURATION   = 10000; // ms

    // Per-type colour palette (extended in US-10..US-16). Placeholder 'test' here.
    const POWERUP_COLORS = {
        test: '#FFFFFF',
        fast: '#FF6B35',
        slow: '#74B9FF',
        wide: '#00B894',
        small: '#E17055'
    };
    // Per-type short label drawn inside the capsule.
    const POWERUP_LABELS = {
        test: 'T',
        fast: '▲',
        slow: '▼',
        wide: '◀▶',
        small: '▶◀'
    };
    // Per-type effect duration in milliseconds (real types arrive in later US).
    const POWERUP_DURATIONS = {
        test: 5000,
        fast: SPEED_DURATION,
        slow: SPEED_DURATION,
        wide: PADDLE_SIZE_DURATION,
        small: PADDLE_SIZE_DURATION
    };

    // Real power-up types available in the random drop pool (US-10).
    // 'test' is intentionally kept out of the pool: it was a US-09 placeholder
    // and remains supported in POWERUP_COLORS/LABELS/DURATIONS only for tooling.
    const POWERUP_TYPES = ['fast', 'slow', 'wide', 'small'];

    // ============================================================
    // CANVAS SETUP
    // ============================================================
    const canvas  = document.getElementById('gameCanvas');
    canvas.width  = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;
    const ctx     = canvas.getContext('2d');

    // ============================================================
    // GAME STATE
    // ============================================================

    // Ball
    let ballX  = CANVAS_WIDTH / 2;
    let ballY  = 420; // initial position above paddle
    let ballVX = BALL_SPEED_X;
    let ballVY = -BALL_SPEED_Y;
    // Current ball speed magnitude — driven by US-10 speed power-ups.
    // Defaults to BALL_SPEED_MAG and is restored to that value at effect
    // expiration (AC-04: no cumulative drift).
    let currentSpeedMag = BALL_SPEED_MAG;

    // Paddle - centred horizontally
    let paddleX = (CANVAS_WIDTH - PADDLE_WIDTH) / 2;
    // Current paddle width — driven by US-11 size power-ups. Defaults to
    // PADDLE_WIDTH and is restored to that value at effect expiration (AC-05).
    let currentPaddleWidth = PADDLE_WIDTH;

    // Lives & score
    let lives = MAX_LIVES;
    let score = 0;

    // Game state machine: 'playing' | 'gameover' | 'victory' (US-07) | 'start' (US-08)
    let gameState = 'start';

    // Bricks - 2-D array [row][col], value: true = alive, false = destroyed
    const bricks = GameCore.buildBricks(BRICK_ROWS, BRICK_COLS);

    // Power-up state (US-09)
    // activePowerUps: capsules currently falling toward the paddle.
    // Each entry: { x, y, type, color, label, size }
    let activePowerUps = [];
    // activeEffects: timed effects currently in play, keyed by power-up type.
    // Each entry: { remainingMs, totalMs }
    let activeEffects = {};

    // ============================================================
    // INPUT - keyboard, mouse and touch move the paddle
    // ============================================================

    // --- Keyboard: track pressed keys so movement is continuous while held ---
    const keys = {};

    window.addEventListener('keydown', (e) => {
        keys[e.key.toLowerCase()] = true;
        // Start the game on any key (except F1-F12 and dead keys) from the start screen
        if (gameState === 'start' && !e.key.startsWith('F') && e.key !== 'Dead') {
            gameState = 'playing';
            return;
        }
        // Restart the game on Space when game over
        if (e.key === ' ' && (gameState === 'gameover' || gameState === 'victory')) {
            resetGame();
        }
    });

    window.addEventListener('keyup', (e) => {
        keys[e.key.toLowerCase()] = false;
    });

    // --- Mouse click: start game from start screen ---
    canvas.addEventListener('mousedown', () => {
        if (gameState === 'start') {
            gameState = 'playing';
        }
    });

    // --- Mouse: centre paddle on cursor position ---
    canvas.addEventListener('mousemove', (e) => {
        const rect  = canvas.getBoundingClientRect();
        // Account for CSS scaling: map client coords back to canvas coords
        const scaleX = CANVAS_WIDTH / rect.width;
        const clientX = (e.clientX - rect.left) * scaleX;
        paddleX = clientX - currentPaddleWidth / 2;
        // Clamp paddle inside canvas
        paddleX = Math.max(0, Math.min(CANVAS_WIDTH - currentPaddleWidth, paddleX));
    });

    // --- Touch: drag paddle relative to initial touch position ---
    let touchStartX  = 0;
    let paddleStartX = 0;

    canvas.addEventListener('touchstart', (e) => {
        // Start game on touch from start screen
        if (gameState === 'start') {
            gameState = 'playing';
            return;
        }
        // Restart on touch when game is over
        if (gameState === 'gameover' || gameState === 'victory') {
            resetGame();
            return;
        }
        const touch  = e.touches[0];
        touchStartX  = touch.clientX;
        paddleStartX = paddleX;
    });

    canvas.addEventListener('touchmove', (e) => {
        // preventDefault stops the page from scrolling while playing
        e.preventDefault();
        const touch = e.touches[0];
        paddleX = paddleStartX + (touch.clientX - touchStartX);
        paddleX = Math.max(0, Math.min(CANVAS_WIDTH - currentPaddleWidth, paddleX));
    }, { passive: false }); // { passive: false } is required for preventDefault to work

    canvas.addEventListener('touchend', () => {
        touchStartX  = 0;
        paddleStartX = 0;
    });

    // ============================================================
    // HELPERS
    // ============================================================

    // ============================================================
    // HUD - DOM-based display (lives)
    // ============================================================
    function updateHUD() {
        document.getElementById('livesDisplay').textContent = '●'.repeat(lives);
        document.getElementById('scoreDisplay').textContent = score;
    }

    // Reset ball to starting position
    function resetBall() {
        ballX  = CANVAS_WIDTH / 2;
        ballY  = 420;
        ballVX = BALL_SPEED_X;
        ballVY = -BALL_SPEED_Y;
    }

    // Spawn a falling capsule centred on a destroyed brick.
    // Uses brick grid coordinates (row, col) to compute world-space origin.
    function spawnPowerUp(row, col, type) {
        const brickX = BRICK_OFFSET_X + col * (BRICK_WIDTH  + BRICK_GAP);
        const brickY = BRICK_OFFSET_Y + row * (BRICK_HEIGHT + BRICK_GAP);
        const capsuleX = brickX + (BRICK_WIDTH  - POWERUP_SIZE) / 2;
        const capsuleY = brickY + (BRICK_HEIGHT - POWERUP_SIZE) / 2;
        activePowerUps.push({
            x: capsuleX,
            y: capsuleY,
            type: type,
            color: POWERUP_COLORS[type],
            label: POWERUP_LABELS[type],
            size: POWERUP_SIZE
        });
    }

    // Activate (or extend) a timed effect for a given power-up type.
    // CR-01: collecting the same type while the effect is already active
    // ADDS the duration to the remaining time (capped at duration * 3) and
    // does NOT re-apply the magnitude (no speed compounding). On first
    // collection, the effect starts fresh and the magnitude is applied.
    function activateEffect(type) {
        const duration    = POWERUP_DURATIONS[type];
        const maxDuration = duration * 3; // CR-01 cap

        // AC-07: opposite paddle-size effect cancels the current one. The size
        // is reset to PADDLE_WIDTH here so the new multiplier (applied below on
        // first collection) starts from the base width, not a stacked one.
        if (type === 'wide' && activeEffects['small']) {
            delete activeEffects['small'];
            currentPaddleWidth = PADDLE_WIDTH;
        } else if (type === 'small' && activeEffects['wide']) {
            delete activeEffects['wide'];
            currentPaddleWidth = PADDLE_WIDTH;
        }

        if (activeEffects[type]) {
            // Stack: extend remaining time, cap at 3x, do NOT re-apply magnitude.
            activeEffects[type].remainingMs = Math.min(
                activeEffects[type].remainingMs + duration,
                maxDuration
            );
            activeEffects[type].totalMs = maxDuration;
            return; // effect already applied — no speed/size change
        }

        // First collection: start fresh.
        activeEffects[type] = { remainingMs: duration, totalMs: duration };

        // Speed power-ups (US-10): apply magnitude change on first activation
        // only. Direction is preserved (AC-03) by renormalising the existing
        // velocity vector. Effect lands on the same frame as collection (AC-05).
        if (type === 'fast' || type === 'slow') {
            const multiplier = (type === 'fast') ? SPEED_FAST_MULT : SPEED_SLOW_MULT;
            currentSpeedMag = GameCore.computeSpeedEffect(BALL_SPEED_MAG, multiplier);
            applyBallSpeedMagnitude(currentSpeedMag);
        }

        // Paddle size power-ups (US-11): apply width change on first activation
        // only. PADDLE_WIDTH is never mutated (AC-05).
        else if (type === 'wide' || type === 'small') {
            const mult = (type === 'wide') ? PADDLE_WIDE_MULT : PADDLE_SMALL_MULT;
            currentPaddleWidth = PADDLE_WIDTH * mult;
            // AC-03: recentre the paddle on its current position, clamp in canvas
            paddleX = paddleX + (PADDLE_WIDTH - currentPaddleWidth) / 2;
            // AC-04: never let the resized paddle leave the canvas
            paddleX = Math.max(0, Math.min(CANVAS_WIDTH - currentPaddleWidth, paddleX));
        }
    }

    // Renormalise the ball velocity vector to the requested magnitude while
    // preserving its direction. Used by US-10 speed effects on apply / expire.
    function applyBallSpeedMagnitude(newMag) {
        const currentMag = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
        if (currentMag === 0) return; // ball is stationary — nothing to scale
        const scale = newMag / currentMag;
        ballVX *= scale;
        ballVY *= scale;
    }

    // Full game reset - called on restart after game over
    function resetGame() {
        lives = MAX_LIVES;
        score = 0;
        resetBall();
        currentPaddleWidth = PADDLE_WIDTH;
        paddleX = (CANVAS_WIDTH - PADDLE_WIDTH) / 2;
        // Rebuild all bricks using GameCore helper
        const freshBricks = GameCore.buildBricks(BRICK_ROWS, BRICK_COLS);
        for (let r = 0; r < BRICK_ROWS; r++) bricks[r] = freshBricks[r];
        // Clear in-flight power-ups and cancel any active effects (AC-09)
        activePowerUps = [];
        activeEffects  = {};
        // Restore base ball speed magnitude (US-10 AC-04: no drift across runs).
        currentSpeedMag = BALL_SPEED_MAG;
        gameState = 'playing';
        updateHUD();
    }

    // ============================================================
    // UPDATE - all game logic; no drawing here
    // ============================================================
    function update(deltaTime) {
        // Freeze the game when not in 'playing' state
        if (gameState !== 'playing') return;

        // Scale factor: normalise deltaTime to a 60 fps baseline (16.667 ms/frame).
        // Used consistently for both ball movement and paddle movement.
        const dt = deltaTime / (1000 / 60);

        // --- Keyboard paddle movement ---
        if (keys[KEY_LEFT] || keys['arrowleft']) {
            paddleX -= PADDLE_SPEED * dt;
        }
        if (keys[KEY_RIGHT] || keys['arrowright']) {
            paddleX += PADDLE_SPEED * dt;
        }
        // Clamp paddle within canvas bounds (applied here, not in event handlers)
        paddleX = Math.max(0, Math.min(CANVAS_WIDTH - currentPaddleWidth, paddleX));

        // --- Move ball ---
        ballX += ballVX * dt;
        ballY += ballVY * dt;

        // --- Wall collisions (delegated to GameCore) ---
        const wallResult = GameCore.computeWallCollisions(ballX, ballY, ballVX, ballVY, BALL_RADIUS, CANVAS_WIDTH, CANVAS_HEIGHT);
        ballX = wallResult.x; ballY = wallResult.y;
        ballVX = wallResult.vx; ballVY = wallResult.vy;
        if (wallResult.lost) {
            lives -= 1;
            updateHUD();
            if (lives === 0) {
                // No lives remaining - go to game over
                gameState = 'gameover';
                // Clear in-flight power-ups and cancel any active effects (AC-09)
                activePowerUps = [];
                activeEffects  = {};
                // Restore base paddle width (US-11 AC-05: no drift across runs)
                currentPaddleWidth = PADDLE_WIDTH;
            } else {
                // Still have lives - reset ball and paddle, continue
                resetBall();
                // US-11: clear size effects and restore base paddle width
                delete activeEffects['wide'];
                delete activeEffects['small'];
                currentPaddleWidth = PADDLE_WIDTH;
                paddleX = (CANVAS_WIDTH - PADDLE_WIDTH) / 2;
            }
            return; // skip remaining collision checks this frame
        }

        // --- Paddle collision (delegated to GameCore) ---
        // NOTE on tunneling: AABB detection is sufficient at current speeds
        // (BALL_SPEED_MAG ~ 5.66 px/frame vs BRICK_HEIGHT 20 px, BALL_RADIUS*2 16 px).
        // With US-10 SPEED_FAST_MULT = 1.6 the peak per-frame magnitude reaches
        // ~9.06 px, still below min(BRICK_HEIGHT, BALL_RADIUS*2) = 16 px.
        // If future power-ups push the speed past 16 px/frame, switch to a
        // raycast / swept-AABB approach to prevent tunneling.
        const paddleResult = GameCore.computePaddleBounce(ballX, ballY, ballVX, ballVY, BALL_RADIUS, paddleX, PADDLE_Y, currentPaddleWidth, PADDLE_HEIGHT, MAX_BOUNCE_ANGLE, currentSpeedMag);
        ballVX = paddleResult.vx; ballVY = paddleResult.vy; ballY = paddleResult.y;

        // --- Brick collisions (delegated to GameCore) ---
        // At most one brick collision is processed per frame.
        const brickResult = GameCore.computeBrickCollision(ballX, ballY, ballVX, ballVY, BALL_RADIUS, bricks, BRICK_OFFSET_X, BRICK_OFFSET_Y, BRICK_WIDTH, BRICK_HEIGHT, BRICK_GAP);
        if (brickResult !== null) {
            bricks[brickResult.hitRow][brickResult.hitCol] = false;
            ballVX = brickResult.vx; ballVY = brickResult.vy;
            ballX = brickResult.x; ballY = brickResult.y;
            score += ROW_POINTS[brickResult.hitRow];
            updateHUD();

            // --- Power-up drop roll (AC-01) ---
            // On every brick destruction, roll for a capsule drop. US-10 brings
            // the first real types ('fast' / 'slow') into the pool; later US
            // extend POWERUP_TYPES with the remaining mechanics.
            if (Math.random() < POWERUP_DROP_CHANCE) {
                const randomType = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
                spawnPowerUp(brickResult.hitRow, brickResult.hitCol, randomType);
            }

            if (GameCore.checkVictory(bricks)) gameState = 'victory';
        }

        // --- Power-up capsules: fall, collect, despawn (AC-02..AC-04, AC-07) ---
        // Iterate backwards so splice() during the loop is safe.
        for (let i = activePowerUps.length - 1; i >= 0; i--) {
            const capsule = activePowerUps[i];
            capsule.y += POWERUP_FALL_SPEED * dt;

            // Collection by paddle - delegated to pure GameCore function (AC-08)
            if (GameCore.checkPowerUpCollection(capsule, paddleX, PADDLE_Y, currentPaddleWidth, PADDLE_HEIGHT)) {
                activateEffect(capsule.type);
                activePowerUps.splice(i, 1);
                continue;
            }

            // Silent despawn when the capsule leaves the bottom of the canvas (AC-04)
            if (capsule.y > CANVAS_HEIGHT) {
                activePowerUps.splice(i, 1);
            }
        }

        // --- Timed effects: decrement and expire (AC-06) ---
        for (const type of Object.keys(activeEffects)) {
            activeEffects[type].remainingMs -= deltaTime;
            if (activeEffects[type].remainingMs <= 0) {
                delete activeEffects[type];
                // US-10 AC-04: on expiry, restore the base magnitude exactly —
                // no cumulative drift. Direction is preserved (AC-03) by
                // renormalising the existing velocity vector.
                if (type === 'fast' || type === 'slow') {
                    currentSpeedMag = BALL_SPEED_MAG;
                    applyBallSpeedMagnitude(currentSpeedMag);
                }
                // US-11 AC-05: on expiry, restore the base paddle width exactly
                // — no cumulative drift. Re-clamp so the shrink/grow stays valid.
                if (type === 'wide' || type === 'small') {
                    currentPaddleWidth = PADDLE_WIDTH;
                    paddleX = Math.max(0, Math.min(CANVAS_WIDTH - currentPaddleWidth, paddleX));
                }
            }
        }
    }

    // ============================================================
    // DRAW - pure rendering; no game-state mutations
    // ============================================================
    function draw() {
        // Clear canvas each frame
        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // Canvas background
        ctx.fillStyle = '#0d0d1a';
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // --- Draw bricks ---
        for (let r = 0; r < BRICK_ROWS; r++) {
            ctx.fillStyle = ROW_COLORS[r];
            for (let c = 0; c < BRICK_COLS; c++) {
                if (!bricks[r][c]) continue;

                const brickX = BRICK_OFFSET_X + c * (BRICK_WIDTH  + BRICK_GAP);
                const brickY = BRICK_OFFSET_Y + r * (BRICK_HEIGHT + BRICK_GAP);

                ctx.fillRect(brickX, brickY, BRICK_WIDTH, BRICK_HEIGHT);
            }
        }

        // --- Draw paddle ---
        ctx.fillStyle = '#ecf0f1';
        ctx.fillRect(paddleX, PADDLE_Y, currentPaddleWidth, PADDLE_HEIGHT);

        // --- Draw ball ---
        ctx.beginPath();
        ctx.arc(ballX, ballY, BALL_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.closePath();

        // --- Draw power-up capsules (AC-05, AC-07) ---
        // Coloured square + centred single-letter label. Colours come from
        // POWERUP_COLORS so each type stays visually distinct on the dark bg.
        for (const capsule of activePowerUps) {
            ctx.fillStyle = capsule.color;
            ctx.fillRect(capsule.x, capsule.y, capsule.size, capsule.size);

            ctx.fillStyle = '#000000';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(capsule.label, capsule.x + capsule.size / 2, capsule.y + capsule.size / 2);
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
        }

        // --- Draw active effect indicators in the in-canvas HUD (AC-06) ---
        // One small label per active effect, stacked at the bottom of the canvas.
        const activeEffectKeys = Object.keys(activeEffects);
        if (activeEffectKeys.length > 0) {
            ctx.font = '14px monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
            const lineHeight = 18;
            const baseY = CANVAS_HEIGHT - 8 - (activeEffectKeys.length - 1) * lineHeight;
            for (let i = 0; i < activeEffectKeys.length; i++) {
                const type = activeEffectKeys[i];
                const effect = activeEffects[type];
                const secondsLeft = Math.ceil(effect.remainingMs / 1000);
                ctx.fillStyle = POWERUP_COLORS[type] || '#ffffff';
                ctx.fillText(type.toUpperCase() + ' ' + secondsLeft + 's', 8, baseY + i * lineHeight);
            }
        }

        // --- Start screen overlay ---
        if (gameState === 'start') {
            // Semi-transparent dark veil over the game background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Vertical layout anchored to canvas centre
            const cx = CANVAS_WIDTH  / 2;
            const cy = CANVAS_HEIGHT / 2;

            // Title
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 52px monospace';
            ctx.fillText('BREAKOUT', cx, cy - 90);

            // Subtitle
            ctx.fillStyle = '#aaaaaa';
            ctx.font = '20px monospace';
            ctx.fillText('Casse toutes les briques !', cx, cy - 48);

            // Controls section
            ctx.fillStyle = '#cccccc';
            ctx.font = '18px monospace';
            ctx.fillText('Clavier : Q / D  ou  ← →', cx, cy + 8);
            ctx.fillText('Souris : deplace la raquette', cx, cy + 36);
            ctx.fillText('Mobile : glisser', cx, cy + 64);

            // Start instruction
            ctx.fillStyle = '#f1c40f';
            ctx.font = '18px monospace';
            ctx.fillText('Appuie sur ESPACE ou clique pour commencer', cx, cy + 112);

            // Reset alignment to defaults
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
        }

        // --- Game Over overlay ---
        if (gameState === 'gameover') {
            // Semi-transparent black veil
            ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // "GAME OVER" title
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 48px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 60);

            // Score line
            ctx.fillStyle = '#ffffff';
            ctx.font = '28px monospace';
            ctx.fillText('Score : ' + score, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);

            // Replay instruction
            ctx.fillStyle = '#aaaaaa';
            ctx.font = '18px monospace';
            ctx.fillText('Appuie sur ESPACE pour rejouer', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 50);

            // Reset alignment to defaults
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
        } else if (gameState === 'victory') {
            // Semi-transparent green overlay
            ctx.fillStyle = 'rgba(0, 40, 0, 0.7)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            ctx.fillStyle = '#2ecc71';
            ctx.font = 'bold 48px monospace';
            ctx.fillText('YOU WIN !', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 50);

            ctx.fillStyle = '#ffffff';
            ctx.font = '28px monospace';
            ctx.fillText('Score : ' + score, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 10);

            ctx.fillStyle = '#aaaaaa';
            ctx.font = '18px monospace';
            ctx.fillText('Appuie sur ESPACE pour rejouer', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 55);

            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
        }
    }

    // ============================================================
    // GAME LOOP - requestAnimationFrame only; no setInterval/setTimeout
    // ============================================================
    let lastTime = 0;

    function gameLoop(timestamp) {
        // Cap deltaTime to 50 ms to avoid large jumps after tab-switch / lag spike
        const deltaTime = Math.min(timestamp - lastTime, 50);
        lastTime = timestamp;

        update(deltaTime);
        draw();

        requestAnimationFrame(gameLoop);
    }

    // Initialise HUD before first frame
    updateHUD();

    // Kick off the loop
    requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
