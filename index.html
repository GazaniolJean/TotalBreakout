<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <style>
        /* --- Layout --- */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* no scrollbars on desktop 1920x1080 */
            background-color: #0d0d1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #gameWrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #gameHUD {
            width: 100%;          /* same width as canvas */
            max-width: 800px;
            display: flex;
            justify-content: space-between;  /* score left, lives right */
            align-items: center;
            padding: 0 4px;
            color: #fff;
            font-family: monospace;
            font-size: 18px;
            user-select: none;
        }

        #livesDisplay {
            letter-spacing: 4px;
        }

        #scoreDisplay {
            font-family: monospace;
            font-size: 18px;
            color: #fff;
            letter-spacing: 1px;
        }

        #gameCanvas {
            display: block;
            /* CSS-only scaling on mobile: keeps internal coords at 800x600 */
            max-width: 100%;
            aspect-ratio: 4 / 3;
            image-rendering: pixelated;
            border: 2px solid #333a4a;
            box-shadow: 0 0 24px rgba(80, 120, 220, 0.25), 0 0 2px #222;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
      <div id="gameHUD">
        <span id="scoreDisplay">0</span>
        <span id="livesDisplay"></span>
      </div>
      <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
