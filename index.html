<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <style>
        /* --- Layout --- */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* no scrollbars on desktop 1920x1080 */
            background-color: #0d0d1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #gameWrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #gameHUD {
            width: 100%;          /* same width as canvas */
            max-width: 800px;
            display: flex;
            justify-content: space-between;  /* score left, lives right */
            align-items: center;
            padding: 0 4px;
            color: #fff;
            font-family: monospace;
            font-size: 18px;
            user-select: none;
        }

        #livesDisplay {
            letter-spacing: 4px;
        }

        #scoreDisplay {
            font-family: monospace;
            font-size: 18px;
            color: #fff;
            letter-spacing: 1px;
        }

        #gameCanvas {
            display: block;
            /* CSS-only scaling on mobile: keeps internal coords at 800x600 */
            max-width: 100%;
            aspect-ratio: 4 / 3;
            image-rendering: pixelated;
            border: 2px solid #333a4a;
            box-shadow: 0 0 24px rgba(80, 120, 220, 0.25), 0 0 2px #222;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
      <div id="gameHUD">
        <span id="scoreDisplay">0</span>
        <span id="livesDisplay"></span>
      </div>
      <canvas id="gameCanvas"></canvas>
    </div>

    <script src="src/game-core.js"></script>
    <script type="module">
import {
    CANVAS_WIDTH, CANVAS_HEIGHT,
    BALL_RADIUS, BALL_SPEED_X, BALL_SPEED_Y, BALL_SPEED_MAG,
    PADDLE_WIDTH, PADDLE_HEIGHT, PADDLE_Y, MAX_BOUNCE_ANGLE,
    KEY_LEFT, KEY_RIGHT, PADDLE_SPEED,
    BRICK_ROWS, BRICK_COLS, BRICK_WIDTH, BRICK_HEIGHT, BRICK_GAP,
    BRICK_OFFSET_Y, BRICK_OFFSET_X, ROW_COLORS, ROW_POINTS,
    MAX_LIVES,
    POWERUP_DROP_CHANCE, EXTRA_LIFE_DROP_CHANCE, EXPLOSIVE_BRICK_CHANCE,
    POWERUP_FALL_SPEED, POWERUP_SIZE,
    SPEED_FAST_MULT, SPEED_SLOW_MULT, SPEED_DURATION,
    PADDLE_WIDE_MULT, PADDLE_SMALL_MULT, PADDLE_SIZE_DURATION,
    STICKY_DURATION,
    MULTIBALL_COUNT, MULTIBALL_SPREAD_DEG, MAX_BALLS,
    PENETRATION_COUNT, PENETRATION_DURATION,
    POWERUP_DEFS, POWERUP_COLORS, POWERUP_LABELS, POWERUP_DURATIONS, POWERUP_TYPES,
} from './src/constants.js';

import { state, resetBallsState, resetBricksState, resetFullState } from './src/state.js';
import { keys, initInput } from './src/input.js';
import { spawnPowerUp, activateEffect, applyBallSpeedMagnitude, initPowerups } from './src/powerups.js';

// Bridge: game-core.js is still loaded as a non-module script (step 1 shim)
// and sets window.GameCore. We alias it here for use in this module.
const GameCore = window.GameCore;

    // ============================================================
    // CANVAS SETUP
    // ============================================================
    const canvas  = document.getElementById('gameCanvas');
    canvas.width  = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;
    const ctx     = canvas.getContext('2d');

    // ============================================================
    // GAME STATE
    // ============================================================

    // ============================================================
    // INPUT - keyboard, mouse and touch move the paddle
    // ============================================================
    // Listeners registered in BOOT via initInput() (see src/input.js).

    // ============================================================
    // HELPERS
    // ============================================================

    // ============================================================
    // HUD - DOM-based display (lives)
    // ============================================================
    function updateHUD() {
        // Show up to 3 dots; if lives > 3 append a numeric count
        const dots = '●'.repeat(Math.min(state.lives, 3));
        const extra = state.lives > 3 ? ' +' + (state.lives - 3) : '';
        document.getElementById('livesDisplay').textContent = dots + extra;
        document.getElementById('scoreDisplay').textContent = state.score;
    }




    // Release a glued ball (US-14). Computes the release velocity with the same
    // GameCore.computePaddleBounce used for normal bounces, evaluated at the
    // current release position. vy=1 is passed to satisfy the bounce guard.
    function releaseStickyBall(ball) {
        const releaseResult = GameCore.computePaddleBounce(
            ball.x, PADDLE_Y, 0, 1, BALL_RADIUS, // vy=1 to trigger the bounce guard
            state.paddleX, PADDLE_Y, state.currentPaddleWidth, PADDLE_HEIGHT,
            MAX_BOUNCE_ANGLE, state.currentSpeedMag
        );
        ball.vx      = releaseResult.vx;
        ball.vy      = releaseResult.vy;
        ball.y       = releaseResult.y;
        ball.stuck   = false;
        ball.stickyTimer = 0;
    }

    // Full game reset - called on restart after game over
    function resetGame() {
        resetFullState();
        updateHUD();
    }

    // ============================================================
    // UPDATE - all game logic; no drawing here (R5 decomposition)
    // ============================================================

    // R5: keyboard-driven paddle movement + clamp.
    function updatePaddle(dt) {
        if (keys[KEY_LEFT] || keys['arrowleft']) {
            state.paddleX -= PADDLE_SPEED * dt;
        }
        if (keys[KEY_RIGHT] || keys['arrowright']) {
            state.paddleX += PADDLE_SPEED * dt;
        }
        // Clamp paddle within canvas bounds (applied here, not in event handlers)
        state.paddleX = Math.max(0, Math.min(CANVAS_WIDTH - state.currentPaddleWidth, state.paddleX));
    }

    // R7: centralise brick destruction so bricks AND brickTypes stay in sync.
    // Marks the cell destroyed, awards points, and returns the points awarded
    // (caller decides on power-up drops / explosion chains).
    function handleBrickDestruction(row, col) {
        state.bricks[row][col]     = false;
        state.brickTypes[row][col] = 'destroyed'; // R7: avoid a stale 'explosive' read later
        state.score += ROW_POINTS[row];
    }

    // R5: move one ball, resolve wall / paddle / brick collisions.
    // Returns true if the ball survived this frame, false if it was lost (the
    // caller has already removed it from the array via splice).
    function updateBall(i, dt, deltaTime, destroyedThisFrame) {
        const ball = state.balls[i];

        // Move ball
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        // Wall collisions
        const wallResult = GameCore.computeWallCollisions(ball.x, ball.y, ball.vx, ball.vy, BALL_RADIUS, CANVAS_WIDTH, CANVAS_HEIGHT);
        ball.x = wallResult.x; ball.y = wallResult.y;
        ball.vx = wallResult.vx; ball.vy = wallResult.vy;

        if (wallResult.lost) {
            state.balls.splice(i, 1); // remove this ball (AC-05)
            return false;
        }

        // Paddle collision (sticky-aware)
        if (ball.stuck) {
            ball.x = GameCore.stickyBallX(state.paddleX, state.currentPaddleWidth, ball.stickyHitOffset);
            ball.y = PADDLE_Y - BALL_RADIUS;
            ball.vx = 0; ball.vy = 0;
            ball.stickyTimer += deltaTime;
            if (ball.stickyTimer >= STICKY_DURATION) releaseStickyBall(ball);
        } else {
            const paddleResult = GameCore.computePaddleBounce(ball.x, ball.y, ball.vx, ball.vy, BALL_RADIUS,
                state.paddleX, PADDLE_Y, state.currentPaddleWidth, PADDLE_HEIGHT, MAX_BOUNCE_ANGLE, state.currentSpeedMag);
            // R8: a real bounce occurred iff the ball was descending and the
            // paddle function flipped vy upward. Robust replacement for the old
            // `paddleResult.vy !== ball.vy` heuristic.
            const bounceOccurred = (ball.vy > 0) && (paddleResult.vy < 0);
            if (state.stickyActive && bounceOccurred) {
                ball.stuck = true;
                state.stickyActive = false;
                ball.stickyTimer = 0;
                ball.stickyHitOffset = ball.x - state.paddleX;
                ball.x = GameCore.stickyBallX(state.paddleX, state.currentPaddleWidth, ball.stickyHitOffset);
                ball.y = PADDLE_Y - BALL_RADIUS;
                ball.vx = 0; ball.vy = 0;
            } else {
                ball.vx = paddleResult.vx; ball.vy = paddleResult.vy; ball.y = paddleResult.y;
            }
        }

        // Brick collision — penetration-aware (US-13)
        let brickHits = null;
        if (ball.penetration > 0) {
            brickHits = GameCore.computeBrickCollisionPenetrating(
                ball.x, ball.y, ball.vx, ball.vy, BALL_RADIUS,
                state.bricks, BRICK_OFFSET_X, BRICK_OFFSET_Y, BRICK_WIDTH, BRICK_HEIGHT, BRICK_GAP,
                ball.penetration
            );
        } else {
            const standard = GameCore.computeBrickCollision(
                ball.x, ball.y, ball.vx, ball.vy, BALL_RADIUS,
                state.bricks, BRICK_OFFSET_X, BRICK_OFFSET_Y, BRICK_WIDTH, BRICK_HEIGHT, BRICK_GAP
            );
            if (standard) {
                brickHits = {
                    vx: standard.vx, vy: standard.vy,
                    x: standard.x,   y: standard.y,
                    destroyedBricks: [{ row: standard.hitRow, col: standard.hitCol }],
                    remainingPenetration: 0
                };
            }
        }

        if (brickHits !== null) {
            let anyDestroyed = false;
            for (const { row, col } of brickHits.destroyedBricks) {
                const key = row + ',' + col;
                if (!destroyedThisFrame.has(key) && state.bricks[row][col]) {
                    destroyedThisFrame.add(key);
                    const wasExplosive = state.brickTypes[row][col] === 'explosive';
                    handleBrickDestruction(row, col); // R7: bricks + brickTypes + score
                    anyDestroyed = true;

                    // US-16: trigger explosion chain if this brick is explosive (AC-03, AC-04)
                    if (wasExplosive) {
                        const chainDestroyed = GameCore.computeExplosionChain(
                            state.bricks, state.brickTypes, row, col, BRICK_ROWS, BRICK_COLS
                        );
                        for (const { row: cr, col: cc } of chainDestroyed) {
                            const chainKey = cr + ',' + cc;
                            if (!destroyedThisFrame.has(chainKey) && state.bricks[cr][cc]) {
                                destroyedThisFrame.add(chainKey);
                                handleBrickDestruction(cr, cc); // AC-05
                            }
                        }
                    }

                    if (Math.random() < POWERUP_DROP_CHANCE) {
                        const randomType = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
                        spawnPowerUp(row, col, randomType);
                    }
                    if (Math.random() < EXTRA_LIFE_DROP_CHANCE) {
                        spawnPowerUp(row, col, 'extralife');
                    }
                }
            }
            if (anyDestroyed) {
                updateHUD();
                ball.penetration = brickHits.remainingPenetration; // AC-02 decrement
                if (GameCore.checkVictory(state.bricks)) state.gameState = 'victory';
            }
            // Apply returned ball state: unchanged trajectory when piercing
            // (AC-02), reflected bounce when not (AC-03).
            ball.vx = brickHits.vx; ball.vy = brickHits.vy;
            ball.x  = brickHits.x;  ball.y  = brickHits.y;
        }

        return true;
    }

    // R5: power-up capsules fall, get collected, or despawn off the bottom.
    function updatePowerUpCapsules(dt) {
        // Iterate backwards so splice() during the loop is safe.
        for (let i = state.activePowerUps.length - 1; i >= 0; i--) {
            const capsule = state.activePowerUps[i];
            capsule.y += POWERUP_FALL_SPEED * dt;

            // Collection by paddle - delegated to pure GameCore function (AC-08)
            if (GameCore.checkPowerUpCollection(capsule, state.paddleX, PADDLE_Y, state.currentPaddleWidth, PADDLE_HEIGHT)) {
                activateEffect(capsule.type);
                state.activePowerUps.splice(i, 1);
                continue;
            }

            // Silent despawn when the capsule leaves the bottom of the canvas (AC-04)
            if (capsule.y > CANVAS_HEIGHT) {
                state.activePowerUps.splice(i, 1);
            }
        }
    }

    // R5: decrement timed effects and run their expiry side-effects (AC-06).
    function updateTimedEffects(deltaTime) {
        for (const type of Object.keys(state.activeEffects)) {
            state.activeEffects[type].remainingMs -= deltaTime;
            if (state.activeEffects[type].remainingMs <= 0) {
                delete state.activeEffects[type];
                // US-10 AC-04: on expiry, restore the base magnitude exactly —
                // no cumulative drift. Direction is preserved (AC-03) by
                // renormalising the existing velocity vector.
                if (type === 'fast' || type === 'slow') {
                    state.currentSpeedMag = BALL_SPEED_MAG;
                    applyBallSpeedMagnitude(state.currentSpeedMag);
                }
                // US-11 AC-05: on expiry, restore the base paddle width exactly
                // — no cumulative drift. Re-clamp so the shrink/grow stays valid.
                if (type === 'wide' || type === 'small') {
                    state.currentPaddleWidth = PADDLE_WIDTH;
                    state.paddleX = Math.max(0, Math.min(CANVAS_WIDTH - state.currentPaddleWidth, state.paddleX));
                }
                // US-13 AC-06: on expiry, clear the pierce counter on every ball.
                if (type === 'penetration') {
                    state.balls.forEach(ball => { ball.penetration = 0; });
                }
            }
        }
    }

    // R3 + R5: centralise the "all balls gone" bookkeeping. Replaces the two
    // duplicated cleanup branches and fixes the currentSpeedMag bug (AC-04):
    // fast/slow effects are now cleared and the base magnitude restored on
    // every life loss, not just on full reset.
    function handleLifeLost() {
        state.lives -= 1;
        updateHUD();
        // Clear speed and paddle-size effects on every life loss.
        ['fast', 'slow', 'wide', 'small'].forEach(t => delete state.activeEffects[t]);
        state.currentSpeedMag    = BALL_SPEED_MAG; // R3: was never reset when lives > 0
        state.currentPaddleWidth = PADDLE_WIDTH;
        state.stickyActive       = false;
        state.activePowerUps     = [];
        if (state.lives === 0) {
            state.activeEffects = {};
            state.gameState = 'gameover';
        } else {
            resetBallsState();
            state.paddleX = (CANVAS_WIDTH - PADDLE_WIDTH) / 2;
        }
    }

    function update(deltaTime) {
        // Freeze the game when not in 'playing' state
        if (state.gameState !== 'playing') return;

        // Scale factor: normalise deltaTime to a 60 fps baseline (16.667 ms/frame).
        const dt = deltaTime / (1000 / 60);

        updatePaddle(dt);

        // --- Per-ball update loop (US-12 multiball) ---
        // NOTE on tunneling: AABB detection is sufficient at current speeds
        // (BALL_SPEED_MAG ~ 5.66 px/frame vs BRICK_HEIGHT 20 px, BALL_RADIUS*2 16 px).
        // With US-10 SPEED_FAST_MULT = 1.6 the peak per-frame magnitude reaches
        // ~9.06 px, still below min(BRICK_HEIGHT, BALL_RADIUS*2) = 16 px.

        // Track bricks destroyed this frame to prevent double-destruction (AC-04)
        const destroyedThisFrame = new Set();

        for (let i = state.balls.length - 1; i >= 0; i--) {
            updateBall(i, dt, deltaTime, destroyedThisFrame);
        }

        // Life lost only when ALL balls are gone (AC-05)
        if (state.balls.length === 0) {
            handleLifeLost();
            return;
        }

        updatePowerUpCapsules(dt);
        updateTimedEffects(deltaTime);
    }

    // ============================================================
    // DRAW - pure rendering; no game-state mutations (R6 decomposition)
    // ============================================================
    function drawBricks() {
        for (let r = 0; r < BRICK_ROWS; r++) {
            ctx.fillStyle = ROW_COLORS[r];
            for (let c = 0; c < BRICK_COLS; c++) {
                if (!state.bricks[r][c]) continue;

                const brickX = BRICK_OFFSET_X + c * (BRICK_WIDTH  + BRICK_GAP);
                const brickY = BRICK_OFFSET_Y + r * (BRICK_HEIGHT + BRICK_GAP);

                ctx.fillRect(brickX, brickY, BRICK_WIDTH, BRICK_HEIGHT);

                // US-16: draw explosive marker (AC-02)
                if (state.brickTypes[r][c] === 'explosive') {
                    ctx.fillStyle = '#E67E22';
                    ctx.font = 'bold 14px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('✸', brickX + BRICK_WIDTH / 2, brickY + BRICK_HEIGHT / 2);
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'alphabetic';
                    ctx.fillStyle = ROW_COLORS[r];
                }
            }
        }
    }

    function drawPaddle() {
        ctx.fillStyle = '#ecf0f1';
        ctx.fillRect(state.paddleX, PADDLE_Y, state.currentPaddleWidth, PADDLE_HEIGHT);
    }

    function drawBalls() {
        for (const ball of state.balls) {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.closePath();

            if (ball.stuck) {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, BALL_RADIUS + 4, 0, Math.PI * 2);
                ctx.strokeStyle = '#FD79A8';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.closePath();
                ctx.lineWidth = 1;
            }

            // US-13: violet ring while the ball can pierce bricks.
            if (ball.penetration > 0) {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, BALL_RADIUS + 4, 0, Math.PI * 2);
                ctx.strokeStyle = '#A29BFE';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.closePath();
                ctx.lineWidth = 1;
            }
        }
    }

    function drawCapsules() {
        // Coloured square + centred single-letter label. Colours come from
        // POWERUP_COLORS so each type stays visually distinct on the dark bg.
        for (const capsule of state.activePowerUps) {
            ctx.fillStyle = capsule.color;
            ctx.fillRect(capsule.x, capsule.y, capsule.size, capsule.size);

            ctx.fillStyle = '#000000';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(capsule.label, capsule.x + capsule.size / 2, capsule.y + capsule.size / 2);
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
        }
    }

    function drawEffectHUD() {
        // One small label per active effect, stacked at the bottom of the canvas.
        const activeEffectKeys = Object.keys(state.activeEffects);
        if (activeEffectKeys.length === 0) return;
        ctx.font = '14px monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
        const lineHeight = 18;
        const baseY = CANVAS_HEIGHT - 8 - (activeEffectKeys.length - 1) * lineHeight;
        for (let i = 0; i < activeEffectKeys.length; i++) {
            const type = activeEffectKeys[i];
            const effect = state.activeEffects[type];
            const secondsLeft = Math.ceil(effect.remainingMs / 1000);
            ctx.fillStyle = POWERUP_COLORS[type] || '#ffffff';
            ctx.fillText(type.toUpperCase() + ' ' + secondsLeft + 's', 8, baseY + i * lineHeight);
        }
    }

    function drawOverlay() {
        // --- Start screen overlay ---
        if (state.gameState === 'start') {
            // Semi-transparent dark veil over the game background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Vertical layout anchored to canvas centre
            const cx = CANVAS_WIDTH  / 2;
            const cy = CANVAS_HEIGHT / 2;

            // Title
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 52px monospace';
            ctx.fillText('BREAKOUT', cx, cy - 90);

            // Subtitle
            ctx.fillStyle = '#aaaaaa';
            ctx.font = '20px monospace';
            ctx.fillText('Casse toutes les briques !', cx, cy - 48);

            // Controls section
            ctx.fillStyle = '#cccccc';
            ctx.font = '18px monospace';
            ctx.fillText('Clavier : Q / D  ou  ← →', cx, cy + 8);
            ctx.fillText('Souris : deplace la raquette', cx, cy + 36);
            ctx.fillText('Mobile : glisser', cx, cy + 64);

            // Start instruction
            ctx.fillStyle = '#f1c40f';
            ctx.font = '18px monospace';
            ctx.fillText('Appuie sur ESPACE ou clique pour commencer', cx, cy + 112);

            // Reset alignment to defaults
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
        }

        // --- Game Over overlay ---
        if (state.gameState === 'gameover') {
            // Semi-transparent black veil
            ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // "GAME OVER" title
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 48px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 60);

            // Score line
            ctx.fillStyle = '#ffffff';
            ctx.font = '28px monospace';
            ctx.fillText('Score : ' + state.score, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);

            // Replay instruction
            ctx.fillStyle = '#aaaaaa';
            ctx.font = '18px monospace';
            ctx.fillText('Appuie sur ESPACE pour rejouer', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 50);

            // Reset alignment to defaults
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
        } else if (state.gameState === 'victory') {
            // Semi-transparent green overlay
            ctx.fillStyle = 'rgba(0, 40, 0, 0.7)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            ctx.fillStyle = '#2ecc71';
            ctx.font = 'bold 48px monospace';
            ctx.fillText('YOU WIN !', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 50);

            ctx.fillStyle = '#ffffff';
            ctx.font = '28px monospace';
            ctx.fillText('Score : ' + state.score, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 10);

            ctx.fillStyle = '#aaaaaa';
            ctx.font = '18px monospace';
            ctx.fillText('Appuie sur ESPACE pour rejouer', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 60);

            // Reset alignment to defaults
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
        }
    }

    function draw() {
        // Clear canvas each frame
        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // Canvas background
        ctx.fillStyle = '#0d0d1a';
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        drawBricks();
        drawPaddle();
        drawBalls();

        drawCapsules();
        drawEffectHUD();
        drawOverlay();
    }

    // ====

    // ============================================================
    // GAME LOOP - update + draw, driven by requestAnimationFrame
    // ===============

    let lastTime = 0;

    function gameLoop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        let deltaTime = timestamp - lastTime;
        lastTime = timestamp;
        if (deltaTime > 50) deltaTime = 50;
        update(deltaTime);
        draw();
        requestAnimationFrame(gameLoop);
    }

    // ============================================================
    // BOOT
    // ============================================================
    initPowerups(GameCore, updateHUD);
    initInput(canvas, { resetGame, releaseStickyBall });
    updateHUD();
    requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
